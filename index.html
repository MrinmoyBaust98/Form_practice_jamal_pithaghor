<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamal Pitha Ghor</title>
    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <Header>
        <nav>
            <ul>
                <li>Home</li>
                <li>Pitha</li>
                <li>About Us</li>
            </ul>
        </nav>
    </Header>
    <Main>
        <section>
            <h2>Jamal Pitha Ghor</h2>
            <form>
                <fieldset class="basic-info">
                    <legend>Basic info</legend>
                    <label for="name">Your Name</label>
                    <input type="text" name="" id="name">
                    <label for="email"> Your Email</label>
                    <input type="email" name="" id="email">
                </fieldset>

                <fieldset>
                    <legend>Pitha Info</legend>
                    <input type="radio" name="pitha" id="chitoy">
                    <label for="chitoy">Chitoy</label>
                    <input type="radio" name="pitha" id="vapa">
                    <label for="vapa">Vapa</label>
                    <input type="radio" name="pitha" id="puri">
                    <label for="puri">Dal Puri</label>
                </fieldset>

                <fieldset>
                    <legend>Vorta Selection</legend>
                    <input type="checkbox" name="vorta" id="sutki">
                    <label for="sutki">Sutki Vorta</label>
                    <input type="checkbox" name="vorta" id="sorisha">
                    <label for="sorisha">Sorisha Vorta</label>
                    <input type="checkbox" name="vorta" id="jhal">
                    <label for="jhal">Moris Vorta</label>
                </fieldset>

                <fieldset>
                    <legend>Extra Info</legend>
                    <textarea cols="40" rows="3" name="" id=""></textarea>
                </fieldset>

                <input class="from-footer" type="submit" value="Submit">
                <input class="from-footer" type="reset" value="Clear">
            </form>
        </section>
    </Main>
    <Footer></Footer>
</body>

</html>
